<!DOCTYPE html>
<html lang="ar" class="light-style layout-menu-fixed" dir="rtl" data-theme="theme-default">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
  <title>تسجيل الدخول - توبال فليكسي</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Rubik:wght@300;400;500;700&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

  <!-- Core CSS -->
  <link rel="stylesheet" href="css/style.css" />
  
  <style>
    /* Inline overrides for login template compatibility */
    body {
      background-color: #f5f5f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: 'Cairo', 'Rubik', sans-serif;
    }
    
    .authentication-wrapper {
      display: flex;
      flex-basis: 100%;
      min-height: 100vh;
      width: 100%;
      align-items: center;
      justify-content: center;
    }
    
    .authentication-inner {
      width: 100%;
      max-width: 400px;
      padding: 1rem;
    }
    
    .card {
      background: #fff;
      border: 0 solid #d9dee3;
      border-radius: 0.5rem;
      box-shadow: 0 2px 6px 0 rgba(67, 89, 113, 0.12);
      display: flex;
      flex-direction: column;
      word-wrap: break-word;
    }
    
    .card-body {
      padding: 2.25rem;
      flex: 1 1 auto;
    }
    
    .app-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
    }
    
    .app-brand-link {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
    }
    
    .brand-title {
      font-size: 1.75rem;
      font-weight: 700;
      color: #566a7f;
      font-family: 'Rubik', sans-serif;
      letter-spacing: -0.5px;
    }
    
    .brand-primary {
      color: #696cff;
    }
    
    .mb-2 { margin-bottom: 0.5rem !important; }
    .mb-3 { margin-bottom: 1rem !important; }
    .mb-4 { margin-bottom: 1.5rem !important; }
    
    h4 {
      font-size: 1.375rem;
      font-weight: 500;
      color: #566a7f;
      margin-top: 0;
    }
    
    p {
      color: #a1acb8;
      margin-top: 0;
      font-size: 0.9rem;
    }
    
    .form-label {
      color: #566a7f;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.5rem;
      display: inline-block;
      font-weight: 600;
    }
    
    .input-group {
      position: relative;
      display: flex;
      flex-wrap: wrap;
      align-items: stretch;
      width: 100%;
    }
    
    .form-control {
      display: block;
      width: 100%;
      padding: 0.4375rem 0.875rem;
      font-size: 0.9375rem;
      font-weight: 400;
      line-height: 1.53;
      color: #697a8d;
      background-color: #fff;
      background-clip: padding-box;
      border: 1px solid #d9dee3;
      appearance: none;
      border-radius: 0.375rem;
      transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
      outline: none;
    }
    
    .form-control:focus {
      color: #697a8d;
      background-color: #fff;
      border-color: #696cff;
      box-shadow: 0 0 0.25rem 0.05rem rgba(105, 108, 255, 0.25);
    }
    
    .input-group-merge .form-control {
      border-left: 0;
      border-top-left-radius: 0;
      border-bottom-left-radius: 0;
    }
    
    .input-group-text {
      display: flex;
      align-items: center;
      padding: 0.4375rem 0.875rem;
      font-size: 0.9375rem;
      font-weight: 400;
      line-height: 1.53;
      color: #697a8d;
      text-align: center;
      white-space: nowrap;
      background-color: #fff;
      border: 1px solid #d9dee3;
      border-right: 0;
      border-top-left-radius: 0.375rem;
      border-bottom-left-radius: 0.375rem;
    }
    
    .cursor-pointer {
      cursor: pointer !important;
    }
    
    .form-check {
      display: block;
      min-height: 1.5rem;
      padding-right: 1.5rem;
      margin-bottom: 0.125rem;
    }
    
    .form-check-input {
      float: right;
      margin-right: -1.5rem;
      width: 1.2em;
      height: 1.2em;
      margin-top: 0.15em;
      vertical-align: top;
      background-color: #fff;
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      border: 1px solid #d9dee3;
      appearance: none;
      color-adjust: exact;
      border-radius: 0.25em;
      transition: background-color 0.15s ease-in-out, background-position 0.15s ease-in-out, border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
      outline: none;
    }
    
    .form-check-input:checked {
      background-color: #696cff;
      border-color: #696cff;
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20'%3e%3cpath fill='none' stroke='%23fff' stroke-linecap='round' stroke-linejoin='round' stroke-width='3' d='m6 10 3 3 6-6'/%3e%3c/svg%3e");
    }
    
    .form-check-label {
      color: #566a7f;
      font-size: 0.85rem;
      cursor: pointer;
    }
    
    .btn {
      display: inline-block;
      font-weight: 400;
      line-height: 1.53;
      color: #697a8d;
      text-align: center;
      vertical-align: middle;
      cursor: pointer;
      user-select: none;
      background-color: transparent;
      border: 1px solid transparent;
      padding: 0.4375rem 1.25rem;
      font-size: 0.9375rem;
      border-radius: 0.375rem;
      transition: all 0.2s ease-in-out;
      outline: none;
    }
    
    .btn-primary {
      color: #fff;
      background-color: #696cff;
      border-color: #696cff;
      box-shadow: 0 0.125rem 0.25rem 0 rgba(105, 108, 255, 0.4);
    }
    
    .btn-primary:hover {
      color: #fff;
      background-color: #5f61e6;
      border-color: #5f61e6;
      transform: translateY(-1px);
      box-shadow: 0 4px 8px 0 rgba(105, 108, 255, 0.4);
    }
    
    .w-100 { width: 100% !important; }
    .d-grid { display: grid !important; }
    
    .error-alert {
      background-color: #ffe5e5;
      border: 1px solid #ffb3b3;
      color: #ff3e1d;
      padding: 0.75rem 1rem;
      border-radius: 0.375rem;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      text-align: center;
      display: none;
    }
  </style>
</head>

<body>
  <div class="authentication-wrapper">
    <div class="authentication-inner">
      <div class="card">
        <div class="card-body">
          <!-- Logo -->
          <div class="app-brand">
            <a href="#" class="app-brand-link">
              <span class="brand-title"><span class="brand-primary">TOBAL</span> FLEXY</span>
            </a>
          </div>
          <!-- /Logo -->
          <h4 class="mb-2">مرحبا بكم 👋</h4>
          <p class="mb-4">يرجى تسجيل الدخول للوحة التحكم بالآدمن</p>

          <div id="error-msg" class="error-alert"></div>

          <form id="loginForm" class="mb-3">
            <div class="mb-3">
              <label for="password" class="form-label">رمز سر الآدمن (Admin Secret)</label>
              <div class="input-group input-group-merge">
                <input type="password" class="form-control" id="password" name="password" placeholder="أدخل كلمة مرور الآدمن" required />
                <span class="input-group-text cursor-pointer" onclick="togglePasswordVisibility()"><i class="bx bx-hide" id="eye-icon"></i></span>
              </div>
            </div>
            
            <div class="mb-4">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="remember-me" checked />
                <label class="form-check-label" for="remember-me">تذكرني على هذا الجهاز</label>
              </div>
            </div>
            
            <div class="mb-3">
              <button class="btn btn-primary d-grid w-100" type="submit">تسجيل الدخول</button>
            </div>
          </form>

        </div>
      </div>
    </div>
  </div>

  <script>
    // Toggle Password eye icon
    function togglePasswordVisibility() {
      const passwordInput = document.getElementById('password');
      const eyeIcon = document.getElementById('eye-icon');
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        eyeIcon.className = 'bx bx-show';
      } else {
        passwordInput.type = 'password';
        eyeIcon.className = 'bx bx-hide';
      }
    }

    // Check if already logged in
    const token = localStorage.getItem('admin_token');
    if (token) {
      // Fast check if valid by fetching stats or simply redirecting
      window.location.href = 'index.html';
    }

    // Form Submission
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('error-msg');
      errorMsg.style.display = 'none';

      try {
        const response = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        
        const data = await response.json();
        if (response.ok && data.success) {
          localStorage.setItem('admin_token', data.token);
          window.location.href = 'index.html';
        } else {
          errorMsg.innerText = data.message || 'فشل تسجيل الدخول';
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        errorMsg.innerText = 'خطأ في الاتصال بالخادم';
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
