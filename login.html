<!DOCTYPE html>
<html lang="ar" class="light-style layout-menu-fixed" dir="rtl" data-theme="theme-default">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
  <title>تسجيل الدخول - توبال فليكسي</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

  <!-- Core CSS (Sneat) -->
  <link rel="stylesheet" href="assets/vendor/css/rtl/core.css" class="template-customizer-core-css" />
  <link rel="stylesheet" href="assets/vendor/css/rtl/theme-default.css" class="template-customizer-theme-css" />
  <link rel="stylesheet" href="assets/css/rtl/demo.css" />
  <link rel="stylesheet" href="assets/vendor/css/pages/page-auth.css" />

  <!-- Core JS -->
  <script src="assets/vendor/libs/jquery/jquery.js"></script>
  <script src="assets/vendor/js/bootstrap.js"></script>
  
  <style>
    body {
      font-family: 'Rubik', sans-serif;
    }
    .error-alert {
      background-color: #ffe5e5;
      border: 1px solid #ffb3b3;
      color: #ff3e1d;
      padding: 0.75rem 1rem;
      border-radius: 0.375rem;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      text-align: center;
      display: none;
    }
  </style>
</head>

<body>
  <div class="container-xxl">
    <div class="authentication-wrapper authentication-basic container-p-y">
      <div class="authentication-inner">
        <!-- Register -->
        <div class="card">
          <div class="card-body">
            <!-- Logo -->
            <div class="app-brand justify-content-center">
              <a href="index.html" class="app-brand-link gap-2">
                <span class="app-brand-logo demo text-primary" style="font-size: 24px;">
                    <i class="fas fa-satellite-dish"></i>
                </span>
                <span class="app-brand-text demo text-body fw-bolder" style="font-size: 20px;">TOBAL FLEXY</span>
              </a>
            </div>
            <!-- /Logo -->
            <h4 class="mb-2">مرحبا بكم 👋</h4>
            <p class="mb-4">يرجى تسجيل الدخول للوحة التحكم بالآدمن</p>

            <div id="error-msg" class="error-alert"></div>

            <form id="loginForm" class="mb-3">
              <div class="mb-3">
                <label for="password" class="form-label">رمز سر الآدمن (Admin Secret)</label>
                <div class="input-group input-group-merge">
                  <input type="password" class="form-control" id="password" name="password" placeholder="أدخل كلمة مرور الآدمن" required />
                  <span class="input-group-text cursor-pointer" onclick="togglePasswordVisibility()"><i class="bx bx-hide" id="eye-icon"></i></span>
                </div>
              </div>
              
              <div class="mb-3">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="remember-me" checked />
                  <label class="form-check-label" for="remember-me"> تذكرني على هذا الجهاز </label>
                </div>
              </div>
              
              <div class="mb-3">
                <button class="btn btn-primary d-grid w-100" type="submit">تسجيل الدخول</button>
              </div>
            </form>

          </div>
        </div>
        <!-- /Register -->
      </div>
    </div>
  </div>

  <script>
    // Toggle Password eye icon
    function togglePasswordVisibility() {
      const passwordInput = document.getElementById('password');
      const eyeIcon = document.getElementById('eye-icon');
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        eyeIcon.className = 'bx bx-show';
      } else {
        passwordInput.type = 'password';
        eyeIcon.className = 'bx bx-hide';
      }
    }

    // Check if already logged in
    const token = localStorage.getItem('admin_token');
    if (token) {
      window.location.href = 'index.html';
    }

    // Form Submission
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('error-msg');
      errorMsg.style.display = 'none';

      try {
        const response = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        
        const data = await response.json();
        if (response.ok && data.success) {
          localStorage.setItem('admin_token', data.token);
          window.location.href = 'index.html';
        } else {
          errorMsg.innerText = data.message || 'فشل تسجيل الدخول';
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        errorMsg.innerText = 'خطأ في الاتصال بالخادم';
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
